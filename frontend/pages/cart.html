<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NSBM | Cart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/cart.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar cart-navbar px-4">
    <span class="navbar-brand text-white fw-semibold">NSBM Stores – Cart</span>
    <a href="../index.html" class="btn btn-outline-light btn-sm">Back to Menu</a>
  </nav>

  <!-- Cart Container -->
  <div class="container my-5">
    <div class="card cart-card shadow-sm">
      <div class="card-body">

        <table class="table cart-table text-center align-middle">
          <thead>
            <tr>
              <th>Item</th>
              <th>Price (Rs.)</th>
              <th>Qty</th>
              <th>Total (Rs.)</th>
              <th></th>
            </tr>
          </thead>

          <tbody id="cart-body">
            <!-- JS renders rows -->
          </tbody>
        </table>

        <!-- Footer -->
        <div class="cart-footer">
          <h5>
            Grand Total:
            <span id="grand-total">Rs. 0</span>
          </h5>
          <button class="btn btn-success px-4">Place Order</button>
        </div>

      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="../js/cart.js"></script>

</body>
</html>
