<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stall Login - NSBM Canteen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2E8B57;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="login-card text-center">
        <h3 class="fw-bold text-success mb-4">Stall Partner Login</h3>
        <form id="loginForm">
            <div class="mb-3">
                <input type="text" class="form-control form-control-lg" id="username"
                    placeholder="Username (e.g., stall1)" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control form-control-lg" id="password"
                    placeholder="Password (e.g., 123)" required>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">Login to Dashboard</button>
        </form>
        <div id="errorMsg" class="mt-3 text-danger fw-bold"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            fetch('../../Backend/stallController/stall_login_check.php', {
                method: 'POST',
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {

                        localStorage.setItem('stall_id', data.stall_id);
                        localStorage.setItem('stall_name', data.stall_name);

                        window.location.href = 'stall_dashboard.html';
                    } else {
                        document.getElementById('errorMsg').innerText = data.message;
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('errorMsg').innerText = "Connection Error";
                });
        });
    </script>
</body>

</html>
