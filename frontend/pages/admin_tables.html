<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM Admin - Table Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #059669; --dark-sidebar: #0f172a; --bg-body: #f1f5f9; --text-main: #334155; }
        body { background-color: var(--bg-body); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }
        
        /* Sidebar (Same as your previous code) */
        .sidebar { width: 260px; height: 100vh; background-color: var(--dark-sidebar); position: fixed; top: 0; left: 0; padding: 24px; }
        .sidebar-brand { display: flex; align-items: center; color: white; text-decoration: none; font-weight: 700; font-size: 1.25rem; margin-bottom: 2.5rem; }
        .nav-link { display: flex; align-items: center; color: #94a3b8; padding: 12px 16px; border-radius: 10px; margin-bottom: 4px; text-decoration: none; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255, 255, 255, 0.1); color: white; }
        .nav-link i { margin-right: 12px; }
        .main-content { margin-left: 260px; padding: 30px; }

        /* Custom UI */
        .content-card { background: white; border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header-custom { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Checkbox List */
        .stall-checkbox-list { max-height: 250px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; background: #f8fafc; }
        .form-check { padding: 8px 10px; border-radius: 6px; transition: background 0.2s; }
        .form-check:hover { background: #e2e8f0; }
        .table-row-actions button { margin-left: 5px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <a href="#" class="sidebar-brand">
        <div class="bg-success rounded-circle p-1 me-2 d-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
            <i class="bi bi-mortarboard-fill text-white" style="font-size: 0.9rem;"></i>
        </div>
        NSBM Admin
    </a>
    <div class="nav flex-column">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i>Dashboard</a>
        <a href="admin_stalls.html" class="nav-link"><i class="bi bi-shop"></i>Outlets & Stalls</a>
        <a href="#" class="nav-link active"><i class="bi bi-qr-code"></i>Tables & QR</a>
        <a href="#" class="nav-link"><i class="bi bi-receipt"></i>Transactions</a>
    </div>
</nav>

<div class="main-content">
    
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h3 class="fw-bold mb-1">Table Management</h3>
            <p class="text-secondary mb-0">Create tables and assign exclusive outlets.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="content-card">
                <div class="card-header-custom">
                    <h6 class="fw-bold m-0 text-dark"><i class="bi bi-plus-square me-2"></i>Create New Table</h6>
                </div>
                <div class="p-4">
                    <form id="createTableForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Table Number / Name</label>
                            <input type="text" class="form-control" id="tableNumber" placeholder="e.g. T-05 or VIP-1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Allowed Outlets (Permissions)</label>
                            <p class="small text-muted mb-2">Select outlets visible to this table. Leave empty for ALL.</p>
                            
                            <div class="stall-checkbox-list" id="stallListContainer">
                                <div class="text-center text-muted small py-3">Loading outlets...</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 rounded-3 fw-bold shadow-sm">
                            Save Table Configuration
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="content-card h-100">
                <div class="card-header-custom">
                    <h6 class="fw-bold m-0 text-dark">Existing Tables</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadTables()"><i class="bi bi-arrow-clockwise"></i></button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Table No.</th>
                                <th>Assigned Outlets</th>
                                <th>QR Link</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tablesTableBody">
                            <tr><td colspan="4" class="text-center py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const API_GET_STALLS = '../../Backend/stallController/get_stalls.php';
    const API_SAVE_TABLE = '../../Backend/TableController/save_table.php';
    const API_GET_TABLES = '../../Backend/TableController/get_tables.php';
    const APP_URL = 'http://localhost/NSBM-Web-Project/frontend/pages/menu.html'; // Change to your real URL

    // 1. Load Stalls into Checkboxes
    async function loadStallsForForm() {
        try {
            const res = await fetch(API_GET_STALLS);
            const stalls = await res.json();
            const container = document.getElementById('stallListContainer');
            container.innerHTML = '';

            if(stalls.length === 0) {
                container.innerHTML = '<div class="text-danger small">No stalls found. Create stalls first.</div>';
                return;
            }

            // "Select All" Option
            container.innerHTML += `
                <div class="form-check border-bottom mb-2 pb-2">
                    <input class="form-check-input" type="checkbox" id="selectAll" onchange="toggleAll(this)">
                    <label class="form-check-label fw-bold text-dark" for="selectAll">Select All Outlets</label>
                </div>`;

            stalls.forEach(stall => {
                container.innerHTML += `
                    <div class="form-check">
                        <input class="form-check-input stall-check" type="checkbox" value="${stall.id}" id="s_${stall.id}">
                        <label class="form-check-label" for="s_${stall.id}">
                            ${stall.name} <span class="text-muted small">(${stall.category})</span>
                        </label>
                    </div>`;
            });
        } catch (err) { console.error(err); }
    }

    function toggleAll(source) {
        document.querySelectorAll('.stall-check').forEach(cb => cb.checked = source.checked);
    }

    // 2. Load Existing Tables
    async function loadTables() {
        try {
            const res = await fetch(API_GET_TABLES);
            const tables = await res.json();
            const tbody = document.getElementById('tablesTableBody');
            tbody.innerHTML = '';

            tables.forEach(t => {
                // Generate QR Link
                const qrLink = `${APP_URL}?table=${t.table_number}`;
                
                // Format Assigned Stalls
                let assignedHtml = t.allowed_stalls 
                    ? `<span class="badge bg-primary bg-opacity-10 text-primary border border-primary">${t.allowed_stalls}</span>`
                    : `<span class="badge bg-secondary bg-opacity-10 text-dark border">All Outlets (Public)</span>`;

                const row = `
                <tr>
                    <td class="fw-bold fs-5 text-success">${t.table_number}</td>
                    <td>${assignedHtml}</td>
                    <td>
                        <a href="${qrLink}" target="_blank" class="btn btn-sm btn-light border text-primary">
                            <i class="bi bi-box-arrow-up-right"></i> Open Link
                        </a>
                    </td>
                    <td class="text-end table-row-actions">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTable(${t.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } catch (err) { console.error(err); }
    }

    // 3. Save Table
    document.getElementById('createTableForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const tableNum = document.getElementById('tableNumber').value;
        const selectedStalls = Array.from(document.querySelectorAll('.stall-check:checked')).map(cb => cb.value);

        const payload = {
            table_number: tableNum,
            allowed_stalls: selectedStalls
        };

        try {
            const res = await fetch(API_SAVE_TABLE, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if(result.success) {
                alert("Table Created Successfully!");
                document.getElementById('createTableForm').reset();
                loadTables(); // Refresh list
            } else {
                alert("Error: " + result.message);
            }
        } catch (err) { alert("Connection Failed"); }
    });

    // 4. Delete Table (Stub)
    function deleteTable(id) {
        if(confirm("Delete this table configuration?")) {
            // Implement delete_table.php in backend
            alert("Delete function needs backend implementation."); 
        }
    }

    // Init
    loadStallsForForm();
    loadTables();

</script>
</body>
</html>
