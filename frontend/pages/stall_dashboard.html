<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stall Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-shop"></i> <span id="stallNameDisplay">My Stall</span></a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4">
    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="pills-orders-tab" data-bs-toggle="pill" data-bs-target="#pills-orders" type="button">Incoming Orders</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="pills-menu-tab" data-bs-toggle="pill" data-bs-target="#pills-menu" type="button">Manage Menu</button>
        </li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        
        <div class="tab-pane fade show active" id="pills-orders">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Current Orders</div>
                <div class="card-body">
                    <table class="table align-middle">
                        <thead>
                            <tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr>
                        </thead>
                        <tbody id="ordersTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="pills-menu">
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm mb-3">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Add Menu Item</h5>
                            <form id="addMenuForm">
                                <div class="mb-2">
                                    <input type="text" class="form-control" id="itemName" placeholder="Item Name (e.g. Chicken Rice)" required>
                                </div>
                                <div class="mb-2">
                                    <input type="number" class="form-control" id="itemPrice" placeholder="Price (LKR)" required>
                                </div>
                                <div class="mb-2">
                                    <select class="form-select" id="itemCategory">
                                        <option value="Main Dish">Main Dish</option>
                                        <option value="Short Eats">Short Eats</option>
                                        <option value="Drinks">Drinks</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Add to Menu</button>
                            </form>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5>My Menu Items</h5>
                            <ul class="list-group" id="menuList">
                                </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Check Login
    const stallId = sessionStorage.getItem('loggedStallId');
    if(!stallId) window.location.href = 'stall_login.html';
    document.getElementById('stallNameDisplay').innerText = sessionStorage.getItem('loggedStallName');

    // 2. Add Menu Item
    document.getElementById('addMenuForm').addEventListener('submit', function(e){
        e.preventDefault();
        const formData = new FormData();
        formData.append('stall_id', stallId);
        formData.append('name', document.getElementById('itemName').value);
        formData.append('price', document.getElementById('itemPrice').value);
        formData.append('category', document.getElementById('itemCategory').value);

        fetch('../../Backend/stallController/add_menu_item.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadMenu(); // Refresh list
            document.getElementById('addMenuForm').reset();
        });
    });

    // 3. Load Menu Items
    function loadMenu() {
        fetch(`../../Backend/stallController/get_menu_items.php?stall_id=${stallId}`)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('menuList');
            list.innerHTML = '';
            data.forEach(item => {
                list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    ${item.item_name} <span class="badge bg-secondary">${item.category}</span> 
                    <span class="fw-bold">LKR ${item.price}</span>
                </li>`;
            });
        });
    }

    // 4. Load Orders
    function loadOrders() {
        fetch(`../../Backend/stallController/get_orders.php?stall_id=${stallId}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = '';
            data.forEach(order => {
                tbody.innerHTML += `<tr>
                    <td>#${order.id}</td>
                    <td>${order.customer_name}</td>
                    <td>${order.items_json}</td>
                    <td>LKR ${order.total_price}</td>
                    <td><span class="badge bg-warning text-dark">${order.status}</span></td>
                    <td><button class="btn btn-sm btn-success">Mark Ready</button></td>
                </tr>`;
            });
        });
    }

    // Initial Load
    loadMenu();
    loadOrders();
    // Refresh orders every 10 seconds automatically
    setInterval(loadOrders, 10000);

    function logout() {
        sessionStorage.clear();
        window.location.href = 'stall_login.html';
    }
</script>
</body>
</html>
