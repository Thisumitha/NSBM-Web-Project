<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM - Menu View</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #059669;
            --accent-color: #f59e0b;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            padding-bottom: 80px;
        }


        .store-header {
            background: linear-gradient(135deg, #064e3b, #059669);
            color: white;
            padding: 60px 0 80px;
            border-radius: 0 0 30px 30px;
            margin-bottom: -40px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }


        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            margin-bottom: 20px;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-pill {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .cat-pill.active,
        .cat-pill:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(5, 150, 105, 0.2);
        }


        .food-card {
            background: white;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: 100%;
        }

        .food-card:hover {
            transform: translateY(-5px);
        }

        .food-img {
            height: 160px;
            object-fit: cover;
            width: 100%;
            background: #f1f5f9;
        }

        .price-tag {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .btn-add {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: var(--primary-color);
            border: none;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--primary-color);
            color: white;
        }


        .fab-cart {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--accent-color);
            color: #0f172a;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
            z-index: 100;
        }

        .fab-cart:hover {
            transform: scale(1.05);
            color: #0f172a;
        }
    </style>
</head>

<body>

    <header class="store-header text-center">
        <div class="container">
            <a href="menu.html" class="back-btn"><i class="bi bi-arrow-left me-1"></i> Back</a>

            <div class="mt-4">
                <div class="bg-white rounded-circle d-inline-flex p-1 mb-3 shadow-sm">
                    <img src="https://via.placeholder.com/80" id="storeLogo" class="rounded-circle"
                        style="width: 80px; height: 80px; object-fit: cover;">
                </div>
                <h2 class="fw-bold mb-1" id="storeName">Loading...</h2>
                <p class="opacity-75 mb-0" id="storeDesc">Please wait...</p>
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <span class="badge bg-white text-success bg-opacity-25 backdrop-blur"><i
                            class="bi bi-clock me-1"></i> 8:00 AM - 5:00 PM</span>
                    <span class="badge bg-white text-warning bg-opacity-25 backdrop-blur"><i
                            class="bi bi-star-fill me-1"></i> 4.5</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 60px;">

        <div class="category-scroll" id="categoryContainer">
        </div>

        <div class="row g-4 mt-2" id="foodContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
            </div>
        </div>

    </main>

    <a href="cart.html" class="fab-cart">
        <i class="bi bi-basket2-fill fs-5"></i>
        <span>2 Items</span>
        <span class="border-start border-dark ps-2 border-opacity-25">LKR 1250</span>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const MENU_API_URL = '../../Backend/stallController/get_menu_items.php';
        const STALLS_API_URL = '../../Backend/stallController/get_stalls.php';
        const ROOT_PATH = '../../backend/';
        const CART_KEY = 'nsbm_cart';

        const params = new URLSearchParams(window.location.search);
        const stallId = params.get("id");

        let allMenuItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (!stallId) {
                alert("No stall selected!");
                window.location.href = "menu.html";
                return;
            }

            fetchStallDetails();
            fetchMenu();
            updateCartButton();
        });

        async function fetchStallDetails() {
            try {
                const response = await fetch(STALLS_API_URL);
                const stalls = await response.json();

                const currentStall = stalls.find(s => s.id == stallId);

                if (currentStall) {

                    document.getElementById('storeName').innerText = currentStall.name;

                    if (currentStall.owner) {
                        document.getElementById('storeDesc').innerText = "Owner: " + currentStall.owner;
                    }

                    let logoUrl = "https://via.placeholder.com/80?text=Logo";

                    if (currentStall.image_path) {

                        if (currentStall.image_path.includes('Backend') || currentStall.image_path.includes('backend')) {
                            logoUrl = "../../" + currentStall.image_path;
                        } else if (currentStall.image_path.includes('uploads/')) {
                            logoUrl = "../../Backend/" + currentStall.image_path;
                        } else {
                            logoUrl = currentStall.image_path;
                        }
                    }
                    document.getElementById('storeLogo').src = logoUrl;
                }
            } catch (error) {
                console.error("Error fetching stall details:", error);
            }
        }

        async function fetchMenu() {
            const container = document.getElementById('foodContainer');

            try {
                const response = await fetch(`${MENU_API_URL}?stall_id=${stallId}`);
                console.log(response);
                const data = await response.json();

                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="bi bi-egg-fried display-1 text-muted opacity-25"></i>
                        <p class="text-muted mt-3">No menu items found.</p>
                    </div>`;
                    return;
                }

                allMenuItems = data;

                const categories = ["All", ...new Set(data.map(item => item.category))];
                renderCategories(categories);
                renderFood(allMenuItems);

            } catch (error) {
                console.error("Error loading menu:", error);
                container.innerHTML = `<div class="alert alert-danger text-center">Failed to load menu.</div>`;
            }
        }

        function renderCategories(categories) {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';
            categories.forEach((cat, index) => {
                const isActive = index === 0 ? 'active' : '';
                const pill = document.createElement('button');
                pill.className = `cat-pill ${isActive}`;
                pill.innerText = cat;
                pill.onclick = () => filterFood(cat, pill);
                container.appendChild(pill);
            });
        }

        function renderFood(items) {
            const container = document.getElementById('foodContainer');
            container.innerHTML = '';

            items.forEach(item => {

                const dbImage = item.image_url || item.image_path || item.image;
                let imageUrl = "https://via.placeholder.com/500x300?text=No+Image";

                if (dbImage) {
                    if (dbImage.includes('Backend') || dbImage.includes('backend')) {
                        imageUrl = "../../" + dbImage;
                    } else if (dbImage.includes('uploads/')) {
                        imageUrl = "../../Backend/" + dbImage;
                    } else {
                        imageUrl = dbImage;
                    }
                }

                const itemName = item.item_name || item.name || "Unknown Item";
                const price = parseFloat(item.price || 0).toFixed(2);

                const card = `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="food-card h-100 d-flex flex-column">
                    <img src="${imageUrl}" class="food-img" alt="${itemName}" 
                         onerror="this.src='https://via.placeholder.com/500x300?text=Image+Error'">
                    
                    <div class="p-3 d-flex flex-column flex-grow-1">
                        <h6 class="fw-bold mb-1 text-dark text-truncate">${itemName}</h6>
                        <small class="text-muted mb-3">${item.category}</small>
                        
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="price-tag">LKR ${Math.floor(price)}</span>
                            <button class="btn-add shadow-sm" onclick="addToCart(${item.id})">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>`;
                container.innerHTML += card;
            });
        }

        function filterFood(category, btnElement) {
            document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
            btnElement.classList.add('active');
            if (category === "All") renderFood(allMenuItems);
            else renderFood(allMenuItems.filter(item => item.category === category));
        }

        function addToCart(itemId) {
            const item = allMenuItems.find(i => i.id == itemId);

            if (!item) return;

            const btn = event.currentTarget;
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-check-lg"></i>';
            btn.classList.add('bg-success', 'text-white');
            setTimeout(() => {
                btn.innerHTML = originalIcon;
                btn.classList.remove('bg-success', 'text-white');
            }, 1000);

            const itemName = item.item_name || item.name;

            const dbImage = item.image_url || item.image_path || item.image;
            let itemImage = "https://via.placeholder.com/500x300?text=No+Image";
            if (dbImage) {
                if (dbImage.includes('Backend') || dbImage.includes('backend')) {
                    itemImage = "../../" + dbImage;
                } else if (dbImage.includes('uploads/')) {
                    itemImage = "../../Backend/" + dbImage;
                } else {
                    itemImage = dbImage;
                }
            }

            let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
            let existingItem = cart.find(c => c.id == itemId && c.stallId == stallId);

            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    id: itemId,
                    name: itemName,
                    price: parseFloat(item.price),
                    image: itemImage,
                    qty: 1,
                    stallId: stallId,
                    stallName: document.getElementById('storeName').innerText
                });
            }

            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            updateCartButton();
        }

        function updateCartButton() {
            const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
            const fab = document.querySelector('.fab-cart');
            const spanQty = fab.querySelector('span:nth-child(2)');
            const spanPrice = fab.querySelector('span:last-child');

            let totalQty = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalQty += item.qty;
                totalPrice += (item.price * item.qty);
            });

            if (totalQty > 0) {
                fab.style.display = 'flex';
                spanQty.innerText = `${totalQty} Items`;
                spanPrice.innerText = `LKR ${totalPrice.toFixed(0)}`;
            } else {
                fab.style.display = 'none';
            }
        }
    </script>
</body>

</html>
