<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM Edge - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nsbm-green {
            color: #27ae60;
            font-weight: bold;
        }
        .btn-nsbm {
            background-color: #27ae60;
            color: white;
            border: none;
        }
        .btn-nsbm:hover {
            background-color: #219150;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">NSBM <span class="nsbm-green">EDGE</span></h2>
                            <p class="text-muted">Sign in to your account</p>
                        </div>

                        <form action="../../Backend/login/login.php" method="POST">
                            <div class="form-floating mb-3">
                                <input type="text" name="username" class="form-control" id="username" placeholder="Student ID" required>
                                <label for="username">Student ID / Email</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
                                <label for="password">Password</label>
                            </div>

                            <button type="submit" class="btn btn-nsbm w-100 py-2 fw-bold shadow-sm">Login</button>
                            
                            <div class="text-center mt-3">
                                <a href="#" class="text-decoration-none small text-secondary">Forgot password?</a>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-4 small text-muted">&copy; 2026 NSBM Green University</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
