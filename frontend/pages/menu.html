<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM Stores - Campus Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #059669;
            
            --accent-color: #f59e0b;
            
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --card-radius: 16px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 80px;
            
        }

        
        .hero-section {
            background: linear-gradient(135deg, #064e3b, #059669);
            padding: 80px 0 60px;
            color: white;
            border-radius: 0 0 30px 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.2);
            position: relative;
        }

        .hero-title {
            font-weight: 800;
            letter-spacing: -1px;
        }

        
        .table-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        
        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            transform: translateY(30px);
        }

        .search-input {
            border: none;
            border-radius: 50px;
            padding: 15px 25px 15px 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            font-size: 1rem;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        
        .store-card {
            border: none;
            border-radius: var(--card-radius);
            background: white;
            transition: all 0.3s ease;
            overflow: hidden;
            height: 100%;
            position: relative;
        }

        .store-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .img-wrapper {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .store-card:hover .img-wrapper img {
            transform: scale(1.05);
        }

        
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .status-open {
            background-color: rgba(220, 252, 231, 0.9);
            color: #166534;
        }

        .status-closed {
            background-color: rgba(254, 226, 226, 0.9);
            color: #991b1b;
        }

        
        .card-body {
            padding: 20px;
        }

        .store-cat {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            font-weight: 600;
        }

        .btn-visit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-visit:hover {
            background-color: #047857;
            color: white;
        }

        
        .spinner-wrapper {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        
        .fab-cart {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--accent-color);
            color: #0f172a;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            text-decoration: none;
            display: none;
            
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
            z-index: 1000;
            border: 2px solid white;
        }

        .fab-cart:hover {
            transform: scale(1.05);
            color: #0f172a;
        }

        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(245, 158, 11, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }

        .fab-cart.pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>

<body>

    <header class="hero-section text-center">
        <div id="headerTableBadge" class="table-indicator" style="display: none;">
            <i class="bi bi-qr-code-scan"></i> <span id="tableNumberText">Table #</span>
        </div>

        <div class="container">
            <h1 class="display-4 hero-title mb-2">Explore NSBM Stores</h1>
            <p class="lead opacity-75">Find your favorite food, drinks, and essentials.</p>

            <div class="search-box">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="searchInput" class="form-control search-input"
                    placeholder="Search for stores (e.g. Canteen, Juice bar)..." onkeyup="filterStalls()">
            </div>
        </div>
    </header>

    <main class="container py-5 mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">All Outlets</h4>
            <div class="dropdown">
                <button class="btn btn-light bg-white border shadow-sm rounded-pill px-3 dropdown-toggle" type="button"
                    data-bs-toggle="dropdown">
                    <i class="bi bi-filter me-2"></i>Filter
                </button>
                <ul class="dropdown-menu border-0 shadow-lg">
                    <li><a class="dropdown-item" href="#">Open Now</a></li>
                    <li><a class="dropdown-item" href="#">Food</a></li>
                    <li><a class="dropdown-item" href="#">Beverages</a></li>
                </ul>
            </div>
        </div>

        <div class="row g-4" id="storesContainer">
            <div class="col-12">
                <div class="spinner-wrapper">
                    <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;">
                    </div>
                    <p class="text-secondary fw-medium">Locating nearby stores...</p>
                </div>
            </div>
        </div>
    </main>

    <a href="cart.html" class="fab-cart" id="cartPopup">
        <i class="bi bi-basket2-fill fs-5"></i>
        <span id="cartCount">0 Items</span>
        <span class="border-start border-dark ps-2 border-opacity-25" id="cartTotal">LKR 0</span>
    </a>

    <footer class="text-center py-4 text-muted small mt-auto border-top">
        &copy; 2026 NSBM Stores. Designed for students.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/menu.js"></script>

</body>

</html>
